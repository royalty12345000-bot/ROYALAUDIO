<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ROYALTY AUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            background: radial-gradient(circle at 10% 30%, #0b0e1c, #05070f);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(15, 20, 35, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .header {
            padding: 1.6rem 2rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .logo h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e2b9ff, #7d93ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.8rem;
            color: #9aa2da;
            margin-top: 5px;
        }
        .search-row {
            margin-top: 1.3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .search-box {
            flex: 4;
            background: #1a1e38;
            border-radius: 3rem;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .search-box:focus-within {
            border-color: #7c8eff;
        }
        .search-box i {
            color: #a4afea;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        .search-btn {
            background: linear-gradient(95deg, #5a66d9, #7b4eff);
            border: none;
            padding: 0 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            height: 48px;
        }
        .two-panel {
            display: flex;
            flex-wrap: wrap;
        }
        .tracks-panel {
            flex: 2.2;
            padding: 1.8rem 1rem 2rem 2rem;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .player-panel {
            flex: 1.2;
            padding: 1.8rem;
            background: rgba(0,0,0,0.2);
        }
        .section-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9fa9f0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            max-height: 62vh;
            overflow-y: auto;
            padding-right: 6px;
        }
        .track-list::-webkit-scrollbar {
            width: 4px;
        }
        .track-list::-webkit-scrollbar-track {
            background: #20233e;
            border-radius: 10px;
        }
        .track-list::-webkit-scrollbar-thumb {
            background: #5f6bd0;
            border-radius: 10px;
        }
        .track-card {
            background: rgba(25,30,55,0.65);
            backdrop-filter: blur(4px);
            border-radius: 1.2rem;
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.15s;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .track-card:hover {
            background: #2f3462;
            border-color: #6d7eff40;
        }
        .track-card.active {
            background: linear-gradient(110deg, #323a6e, #262c58);
            border-left: 4px solid #b77eff;
        }
        .track-cover {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            background: #191e3a;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .track-info {
            flex: 3;
            overflow: hidden;
        }
        .track-title {
            font-weight: 600;
            color: #f1f3ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 0.7rem;
            color: #b2bbf5;
            margin-top: 4px;
        }
        .track-actions {
            display: flex;
            gap: 10px;
        }
        .track-actions button {
            background: rgba(255,255,255,0.05);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            color: #d2dcff;
            font-size: 1rem;
            cursor: pointer;
        }
        .now-card {
            background: rgba(12,15,32,0.7);
            border-radius: 1.5rem;
            padding: 1.4rem;
            text-align: center;
        }
        .album-art {
            width: 140px;
            height: 140px;
            border-radius: 28px;
            margin: 0 auto 1rem;
            background: #20233e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }
        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .album-art i {
            font-size: 3rem;
            color: #8f9eff;
        }
        .now-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }
        .progress-area {
            margin: 16px 0;
        }
        .progress-bg {
            background: #2a2e55;
            height: 6px;
            border-radius: 10px;
            cursor: pointer;
        }
        .progress-fill {
            width: 0%;
            height: 6px;
            background: linear-gradient(90deg, #c185ff, #737eff);
            border-radius: 10px;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #a7b0e6;
            margin-top: 6px;
        }
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin: 18px 0;
        }
        .player-controls button {
            background: #2c3160;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .play-main {
            background: #5e6ad9 !important;
            width: 56px !important;
        }
        .volume-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        input[type="range"] {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: #404573;
            border-radius: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ced6ff;
            border-radius: 50%;
            cursor: pointer;
        }
        .empty-message, .loading-message {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #8e99cf;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 0.9rem;
            color: #606ba3;
            border-top: 1px solid rgba(255,255,255,0.03);
        }
        @media (max-width: 780px) {
            body { padding: 1rem; }
            .tracks-panel, .player-panel { flex: auto; width: 100%; border-right: none; }
            .track-cover { width: 40px; height: 40px; }
            .album-art { width: 110px; height: 110px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-waveform"></i> RoyalStream</h1>
            <p>Full tracks · ROYAL AUDIO · your personal library</p>
        </div>
        <div class="search-row">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search for songs, artists, tags...">
            </div>
            <button id="searchBtn" class="search-btn"><i class="fas fa-arrow-right"></i> Go</button>
        </div>
    </div>

    <div class="two-panel">
        <div class="tracks-panel">
            <div class="section-badge"><i class="fas fa-images"></i> 500+ SUGGESTIONS · FULL TRACKS</div>
            <div id="trackListContainer" class="track-list">
                <div class="loading-message"><i class="fas fa-spinner fa-pulse"></i> Loading your library from Jamendo...</div>
            </div>
        </div>
        <div class="player-panel">
            <div class="now-card">
                <div class="album-art" id="albumArtContainer">
                    <i class="fas fa-circle-play"></i>
                </div>
                <div class="now-title" id="currentTitle">—</div>
                <div class="progress-area">
                    <div class="progress-bg" id="progressBg">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-row">
                        <span id="currentTimeLabel">0:00</span>
                        <span id="durationLabel">0:00</span>
                    </div>
                </div>
                <div class="player-controls">
                    <button id="prevButton"><i class="fas fa-backward-step"></i></button>
                    <button id="playPauseButton" class="play-main"><i class="fas fa-play"></i></button>
                    <button id="nextButton"><i class="fas fa-forward-step"></i></button>
                </div>
                <div class="volume-wrap">
                    <i class="fas fa-volume-low"></i>
                    <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.7">
                    <i class="fas fa-volume-high"></i>
                </div>
                <div style="margin-top: 14px; font-size: 12px; background:#0b0d1e40; border-radius: 32px; padding: 6px;">
                    <i class="fas fa-download"></i> click the download icon to save full MP3
                </div>
            </div>
        </div>
    </div>
    <footer>🎵 Powered by Jamendo · full‑length tracks from independent artists · 500+ suggestions</footer>
</div>

<script>
    // --------------------------------------------------------------
    // YOUR JAMENDO API KEY (READ & WRITE compatible)
    // --------------------------------------------------------------
    const JAMENDO_CLIENT_ID = 'c2d297d8';   // Your personal key – full tracks unlocked!
    
    let musicLibrary = [];
    let currentTrackIdx = -1;
    let audio = new Audio();
    let isPlaying = false;

    // DOM elements
    const trackContainer = document.getElementById('trackListContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const currentTitleSpan = document.getElementById('currentTitle');
    const albumArtContainer = document.getElementById('albumArtContainer');
    const playPauseBtn = document.getElementById('playPauseButton');
    const prevBtn = document.getElementById('prevButton');
    const nextBtn = document.getElementById('nextButton');
    const progressBg = document.getElementById('progressBg');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTimeLabel');
    const durationSpan = document.getElementById('durationLabel');
    const volumeSlider = document.getElementById('volumeControl');

    function formatTime(sec) {
        if (isNaN(sec) || !isFinite(sec)) return '0:00';
        const mins = Math.floor(sec / 60);
        const secs = Math.floor(sec % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => (m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')));
    }

    // Fetch tracks from Jamendo (full length)
    async function fetchJamendoTracks(endpoint, limit = 50, offset = 0) {
        try {
            const url = `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_CLIENT_ID}&format=json&limit=${limit}&offset=${offset}&order=popularity_total&include=musicinfo${endpoint ? `&${endpoint}` : ''}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.results && data.results.length) {
                return data.results.map(track => ({
                    id: track.id,
                    title: track.name,
                    artist: track.artist_name,
                    duration: track.duration,
                    albumArt: track.album_image || track.artist_image,
                    streamUrl: `https://api.jamendo.com/v3.0/tracks/file/?client_id=${JAMENDO_CLIENT_ID}&id=${track.id}&action=stream`,
                    downloadUrl: `https://api.jamendo.com/v3.0/tracks/file/?client_id=${JAMENDO_CLIENT_ID}&id=${track.id}&action=download`
                }));
            }
            return [];
        } catch (err) {
            console.warn(err);
            return [];
        }
    }

    // Build 500+ suggestions (full tracks) – multiple pages of popular tracks
    async function build500Suggestions() {
        trackContainer.innerHTML = '<div class="loading-message"><i class="fas fa-spinner fa-pulse"></i> Loading 500+ full tracks from Jamendo...</div>';
        
        let allTracks = [];
        const pagesNeeded = 10; // 10 pages × 50 = 500
        for (let page = 0; page < pagesNeeded; page++) {
            const pageTracks = await fetchJamendoTracks('', 50, page * 50);
            allTracks.push(...pageTracks);
            if (allTracks.length >= 500) break;
            await new Promise(r => setTimeout(r, 80)); // mild delay to avoid rate limits
        }
        
        // Deduplicate by id
        const uniqueMap = new Map();
        for (let track of allTracks) {
            if (!uniqueMap.has(track.id) && track.streamUrl) {
                uniqueMap.set(track.id, track);
            }
        }
        musicLibrary = Array.from(uniqueMap.values()).slice(0, 500);
        
        if (musicLibrary.length === 0) {
            // Fallback: search for generic term
            const fallback = await fetchJamendoTracks('search=*', 100);
            musicLibrary = fallback.slice(0, 500);
        }
        
        if (musicLibrary.length === 0) {
            trackContainer.innerHTML = '<div class="empty-message">⚠️ Could not load tracks. Check your API key or internet.</div>';
            return;
        }
        
        renderTrackList();
        currentTrackIdx = 0;
        updateNowPlayingMeta();
        renderTrackList(); // highlight first
    }

    // Search tracks
    async function searchJamendoTracks(query) {
        if (!query.trim()) return;
        trackContainer.innerHTML = '<div class="loading-message"><i class="fas fa-spinner fa-pulse"></i> Searching Jamendo...</div>';
        const searchResults = await fetchJamendoTracks(`search=${encodeURIComponent(query)}`, 100);
        if (searchResults.length) {
            musicLibrary = searchResults;
            renderTrackList();
            currentTrackIdx = 0;
            updateNowPlayingMeta();
            renderTrackList();
        } else {
            musicLibrary = [];
            trackContainer.innerHTML = '<div class="empty-message">No results found. Try another search.</div>';
            currentTrackIdx = -1;
            updateNowPlayingMeta();
        }
    }

    function renderTrackList() {
        if (!musicLibrary.length) {
            trackContainer.innerHTML = '<div class="empty-message">✨ No tracks found. Try searching above.</div>';
            return;
        }
        trackContainer.innerHTML = '';
        musicLibrary.forEach((track, idx) => {
            const isActive = (currentTrackIdx === idx);
            const div = document.createElement('div');
            div.className = `track-card ${isActive ? 'active' : ''}`;
            
            const artworkHtml = track.albumArt 
                ? `<img class="track-cover" src="${track.albumArt}" alt="cover" loading="lazy" onerror="this.src='https://placehold.co/100x100/2a2f55/8f9eff?text=🎵'">`
                : `<div class="track-cover" style="background:#2a2f55; display:flex; align-items:center; justify-content:center; color:#8f9eff;"><i class="fas fa-music"></i></div>`;
            
            div.innerHTML = `
                ${artworkHtml}
                <div class="track-info">
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist)}</div>
                </div>
                <div class="track-actions">
                    <button class="play-track" data-index="${idx}"><i class="fas fa-play"></i></button>
                    <button class="download-track" data-index="${idx}"><i class="fas fa-download"></i></button>
                </div>
            `;
            div.addEventListener('click', (e) => {
                if (!e.target.closest('.download-track') && !e.target.closest('.play-track')) {
                    playTrackAtIndex(idx);
                }
            });
            const playBtn = div.querySelector('.play-track');
            const downloadBtn = div.querySelector('.download-track');
            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                playTrackAtIndex(idx);
            });
            downloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                downloadTrack(track);
            });
            trackContainer.appendChild(div);
        });
    }

    function playTrackAtIndex(index) {
        if (index < 0 || index >= musicLibrary.length) return;
        const track = musicLibrary[index];
        if (!track.streamUrl) {
            alert('Stream not available for this track.');
            return;
        }
        audio.pause();
        isPlaying = false;
        currentTrackIdx = index;
        audio.src = track.streamUrl;
        audio.load();
        audio.volume = parseFloat(volumeSlider.value);
        audio.play()
            .then(() => {
                isPlaying = true;
                updatePlayButton(true);
                updateNowPlayingMeta();
                renderTrackList();
            })
            .catch(err => {
                console.warn(err);
                alert('Playback failed. Try another track.');
            });
        updateNowPlayingMeta();
    }

    function updateNowPlayingMeta() {
        if (currentTrackIdx !== -1 && musicLibrary[currentTrackIdx]) {
            const t = musicLibrary[currentTrackIdx];
            currentTitleSpan.innerText = t.title;
            if (t.albumArt) {
                albumArtContainer.innerHTML = `<img src="${t.albumArt}" alt="album art" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                albumArtContainer.innerHTML = `<i class="fas fa-circle-play"></i>`;
            }
            if (audio.duration && !isNaN(audio.duration)) {
                durationSpan.innerText = formatTime(audio.duration);
            } else {
                durationSpan.innerText = formatTime(t.duration || 30);
            }
        } else {
            currentTitleSpan.innerText = '—';
            albumArtContainer.innerHTML = `<i class="fas fa-circle-play"></i>`;
            durationSpan.innerText = '0:00';
        }
    }

    function updatePlayButton(playing) {
        playPauseBtn.innerHTML = playing ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
    }

    function togglePlay() {
        if (currentTrackIdx === -1 && musicLibrary.length) {
            playTrackAtIndex(0);
            return;
        }
        if (currentTrackIdx === -1) return;
        if (audio.paused) {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton(true);
            }).catch(e => console.warn);
        } else {
            audio.pause();
            isPlaying = false;
            updatePlayButton(false);
        }
    }

    function nextTrack() {
        if (!musicLibrary.length) return;
        let newIdx = (currentTrackIdx + 1) % musicLibrary.length;
        playTrackAtIndex(newIdx);
    }

    function prevTrack() {
        if (!musicLibrary.length) return;
        let newIdx = (currentTrackIdx - 1 + musicLibrary.length) % musicLibrary.length;
        playTrackAtIndex(newIdx);
    }

    function updateProgress() {
        if (audio.duration && !isNaN(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeSpan.innerText = formatTime(audio.currentTime);
            durationSpan.innerText = formatTime(audio.duration);
        } else {
            progressFill.style.width = '0%';
        }
    }

    function seek(e) {
        const rect = progressBg.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const percent = Math.min(1, Math.max(0, clickX / width));
        if (audio.duration) audio.currentTime = percent * audio.duration;
    }

    async function downloadTrack(track) {
        if (!track.downloadUrl) return;
        try {
            // Direct download via anchor tag (Jamendo sends the file)
            const a = document.createElement('a');
            a.href = track.downloadUrl;
            a.download = `${track.title.replace(/[^a-z0-9]/gi, '_')}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } catch (err) {
            alert('Download failed. Please try again.');
        }
    }

    // Event listeners
    searchBtn.addEventListener('click', () => {
        const query = searchInput.value.trim();
        if (query) searchJamendoTracks(query);
        else build500Suggestions();
    });
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (query) searchJamendoTracks(query);
            else build500Suggestions();
        }
    });
    playPauseBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    progressBg.addEventListener('click', seek);
    volumeSlider.addEventListener('input', (e) => audio.volume = parseFloat(e.target.value));

    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', nextTrack);
    audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(true); });
    audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(false); });

    // Start the app
    build500Suggestions();
    audio.volume = 0.7;
    volumeSlider.value = 0.7;
</script>
</body>
</html>
